<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SIM — Security Incident Mapping</title>
<style>
  :root{
    --navy:#1f4e79; --navy-dark:#123049; --red:#a4262c; --bg:#f5f6f8;
    --card:#ffffff; --border:#d9dde3; --text:#1a1a1a; --muted:#6b7280;
  }
  *{box-sizing:border-box;}
  body{margin:0;font-family:Arial,Helvetica,sans-serif;background:var(--bg);color:var(--text);}
  header{background:var(--navy);color:#fff;padding:16px 20px;}
  header h1{margin:0;font-size:20px;}
  header p{margin:4px 0 0;font-size:13px;color:#d9e6f2;}
  nav{display:flex;background:var(--navy-dark);}
  nav button{flex:1;padding:12px 8px;background:none;border:none;color:#cfe0ee;font-size:14px;cursor:pointer;}
  nav button.active{background:var(--bg);color:var(--navy);font-weight:bold;}
  main{max-width:640px;margin:0 auto;padding:16px;}
  section{display:none;}
  section.active{display:block;}
  .card{background:var(--card);border:1px solid var(--border);border-radius:6px;padding:16px;margin-bottom:14px;}
  label{display:block;font-size:14px;font-weight:bold;margin:12px 0 6px;}
  input,select,textarea{width:100%;padding:10px;border:1px solid var(--border);border-radius:4px;font-size:15px;font-family:inherit;}
  textarea{resize:vertical;min-height:80px;}
  .checkbox-row{display:flex;align-items:center;gap:8px;margin-top:14px;}
  .checkbox-row input{width:auto;}
  button.primary{margin-top:18px;width:100%;padding:14px;background:var(--navy);color:#fff;border:none;border-radius:4px;font-size:16px;font-weight:bold;cursor:pointer;}
  button.primary:active{background:var(--navy-dark);}
  .alert-banner{background:#fdecea;border:1px solid var(--red);color:var(--red);padding:10px 12px;border-radius:4px;margin-bottom:14px;font-size:14px;}
  .toast{position:fixed;bottom:20px;left:50%;transform:translateX(-50%);background:#1f4e79;color:#fff;padding:12px 20px;border-radius:6px;font-size:14px;display:none;}
  .report-item{border-bottom:1px solid var(--border);padding:12px 0;}
  .report-item:last-child{border-bottom:none;}
  .report-type{display:inline-block;font-size:12px;font-weight:bold;text-transform:uppercase;background:#eaf1fb;color:var(--navy);padding:2px 8px;border-radius:10px;}
  .report-meta{font-size:12px;color:var(--muted);margin-top:4px;}
  .report-desc{font-size:14px;margin-top:6px;}
  .status-badge{float:right;font-size:11px;padding:2px 8px;border-radius:10px;background:#eee;}
  .status-New{background:#fdecea;color:var(--red);}
  .status-Under_Review{background:#fff4e0;color:#8a5a00;}
  .status-Resolved{background:#e6f4ea;color:#1e7b34;}
  select.status-select{width:auto;display:inline-block;margin-left:8px;font-size:12px;padding:4px;}
  .empty{color:var(--muted);font-size:14px;text-align:center;padding:24px 0;}
  .filter-row{display:flex;gap:8px;margin-bottom:10px;}
  .filter-row select{flex:1;}
  footer{text-align:center;color:var(--muted);font-size:12px;padding:20px;}
</style>
</head>
<body>

<header>
  <h1>SIM — Security Incident Mapping by OLUWASEYIFEMI WITH MAT NO 251201182 IN THE DEPARTMENT OF COMPUTER SCIENCE</h1>
  <p>Report campus security incidents quickly and safely.</p>
</header>

<nav>
  <button class="active" data-tab="report">Report</button>
  <button data-tab="feed">Incident Feed</button>
  <button data-tab="admin">Admin</button>
</nav>

<main>

  <!-- REPORT TAB -->
  <section id="report" class="active">
    <div class="card">
      <div id="alertBanner" class="alert-banner" style="display:none;"></div>
      <label>Incident Type</label>
      <select id="incidentType">
        <option value="">Select type</option>
        <option>Stabbing</option>
        <option>Rape / Sexual Assault</option>
        <option>Stealing / Theft</option>
        <option>Murder</option>
        <option>Assault</option>
        <option>Suspicious Activity</option>
        <option>Other</option>
      </select>

      <label>Location</label>
      <input id="location" type="text" placeholder="e.g. Behind Faculty of Science, Hostel B">

      <label>Date &amp; Time of Incident</label>
      <input id="datetime" type="datetime-local">

      <label>Description</label>
      <textarea id="description" placeholder="Briefly describe what happened..."></textarea>

      <label>Your Role</label>
      <select id="role">
        <option>Student</option>
        <option>Staff</option>
        <option>Landlord</option>
      </select>

      <div class="checkbox-row">
        <input type="checkbox" id="anonymous">
        <label style="margin:0;font-weight:normal;">Report anonymously</label>
      </div>

      <button class="primary" onclick="submitReport()">Submit Report</button>
    </div>
  </section>

  <!-- FEED TAB -->
  <section id="feed">
    <div class="card">
      <div class="filter-row">
        <select id="filterType" onchange="renderFeed()">
          <option value="">All Types</option>
        </select>
      </div>
      <div id="feedList"></div>
    </div>
  </section>

  <!-- ADMIN TAB -->
  <section id="admin">
    <div class="card">
      <label>Broadcast Safety Alert</label>
      <input id="alertInput" type="text" placeholder="e.g. Avoid the back gate area tonight">
      <button class="primary" onclick="broadcastAlert()">Broadcast Alert</button>
    </div>
    <div class="card">
      <div id="adminList"></div>
    </div>
  </section>

</main>

<footer>SIM Prototype — SEN202 Weekend 1 Project</footer>
<div id="toast" class="toast"></div>

<script>
  const STORE_KEY = "sim_reports";
  const ALERT_KEY = "sim_alert";

  function loadReports(){
    return JSON.parse(localStorage.getItem(STORE_KEY) || "[]");
  }
  function saveReports(reports){
    localStorage.setItem(STORE_KEY, JSON.stringify(reports));
  }
  function showToast(msg){
    const t = document.getElementById("toast");
    t.textContent = msg;
    t.style.display = "block";
    setTimeout(()=> t.style.display = "none", 2500);
  }

  // Tab switching
  document.querySelectorAll("nav button").forEach(btn=>{
    btn.addEventListener("click", ()=>{
      document.querySelectorAll("nav button").forEach(b=>b.classList.remove("active"));
      document.querySelectorAll("main section").forEach(s=>s.classList.remove("active"));
      btn.classList.add("active");
      document.getElementById(btn.dataset.tab).classList.add("active");
      if(btn.dataset.tab === "feed") renderFeed();
      if(btn.dataset.tab === "admin") renderAdmin();
    });
  });

  function submitReport(){
    const type = document.getElementById("incidentType").value;
    const location = document.getElementById("location").value.trim();
    const datetime = document.getElementById("datetime").value;
    const description = document.getElementById("description").value.trim();
    const role = document.getElementById("role").value;
    const anonymous = document.getElementById("anonymous").checked;

    if(!type || !location || !description){
      const banner = document.getElementById("alertBanner");
      banner.textContent = "Please fill in Incident Type, Location, and Description.";
      banner.style.display = "block";
      return;
    }
    document.getElementById("alertBanner").style.display = "none";

    const reports = loadReports();
    reports.unshift({
      id: Date.now(),
      type, location, datetime: datetime || new Date().toISOString(),
      description, role: anonymous ? "Anonymous" : role,
      anonymous, status: "New"
    });
    saveReports(reports);

    document.getElementById("incidentType").value = "";
    document.getElementById("location").value = "";
    document.getElementById("datetime").value = "";
    document.getElementById("description").value = "";
    document.getElementById("anonymous").checked = false;

    showToast("Report submitted. Thank you for helping keep campus safe.");
  }

  function renderFeed(){
    const reports = loadReports();
    const typeFilter = document.getElementById("filterType");
    const currentVal = typeFilter.value;
    const types = [...new Set(reports.map(r=>r.type))];
    typeFilter.innerHTML = '<option value="">All Types</option>' +
      types.map(t=>`<option ${t===currentVal?"selected":""}>${t}</option>`).join("");

    const filtered = currentVal ? reports.filter(r=>r.type===currentVal) : reports;
    const list = document.getElementById("feedList");
    if(filtered.length === 0){
      list.innerHTML = '<div class="empty">No incidents reported yet.</div>';
      return;
    }
    list.innerHTML = filtered.map(r=>`
      <div class="report-item">
        <span class="report-type">${r.type}</span>
        <span class="status-badge status-${r.status.replace(" ","_")}">${r.status}</span>
        <div class="report-meta">${r.location} • ${new Date(r.datetime).toLocaleString()} • ${r.role}</div>
        <div class="report-desc">${escapeHtml(r.description)}</div>
      </div>
    `).join("");
  }

  function renderAdmin(){
    const reports = loadReports();
    const list = document.getElementById("adminList");
    if(reports.length === 0){
      list.innerHTML = '<div class="empty">No reports to manage yet.</div>';
      return;
    }
    list.innerHTML = reports.map(r=>`
      <div class="report-item">
        <span class="report-type">${r.type}</span>
        <select class="status-select" onchange="updateStatus(${r.id}, this.value)">
          <option ${r.status==="New"?"selected":""}>New</option>
          <option ${r.status==="Under Review"?"selected":""}>Under Review</option>
          <option ${r.status==="Resolved"?"selected":""}>Resolved</option>
        </select>
        <div class="report-meta">${r.location} • ${new Date(r.datetime).toLocaleString()} • Reporter: ${r.role}</div>
        <div class="report-desc">${escapeHtml(r.description)}</div>
      </div>
    `).join("");
  }

  function updateStatus(id, status){
    const reports = loadReports();
    const r = reports.find(x=>x.id===id);
    if(r){ r.status = status; saveReports(reports); renderAdmin(); }
  }

  function broadcastAlert(){
    const msg = document.getElementById("alertInput").value.trim();
    if(!msg) return;
    localStorage.setItem(ALERT_KEY, msg);
    document.getElementById("alertInput").value = "";
    showToast("Alert broadcast to all users.");
  }

  function escapeHtml(str){
    const div = document.createElement("div");
    div.textContent = str;
    return div.innerHTML;
  }

  // Show active alert banner on report tab if one exists
  window.addEventListener("load", ()=>{
    const alertMsg = localStorage.getItem(ALERT_KEY);
    if(alertMsg){
      const banner = document.getElementById("alertBanner");
      banner.textContent = "⚠ Safety Alert: " + alertMsg;
      banner.style.display = "block";
    }
  });
</script>
</body>
</html>
